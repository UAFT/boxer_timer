<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>Fight Tech Timer</title>
    <meta
      name="description"
      content="Offline sports timer. Local logic. Local audio. No API."
    />
    <link rel="icon" href="./favicon.ico" />
    <link rel="stylesheet" href="./styles/main.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="brand-shell panel">
        <div class="brand-left">
          <img class="brand-logo" src="./assets/brand/fighttech-logo.png" alt="Fight Tech" />
          <div class="brand-copy">
            <div class="brand-title">Fight Tech</div>
            <div class="brand-subtitle">Таймер спортсмена</div>
          </div>
        </div>
        <button class="gear-btn" type="button" id="settingsBtn" aria-label="Настройки">⚙</button>
      </header>

      <section class="preset-row" role="tablist" aria-label="Пресеты таймера">
        <button class="preset-tab is-active" type="button" data-preset="classic3">3′</button>
        <button class="preset-tab" type="button" data-preset="classic2">2′</button>
        <button class="preset-tab" type="button" data-preset="classic1">1′</button>
        <button class="preset-tab" type="button" data-preset="tabata2020x24">⚡</button>
      </section>

      <section class="timer-card panel">
        <div class="card-topline">
          <div class="phase-heading" id="phaseLabel">Готов</div>
          <div class="round-heading" id="roundLabel">Раунд 0 из 0</div>
        </div>

        <div class="main-time" id="mainTime">03:00</div>
        <div class="phase-caption" id="phaseCaption">Следующий этап не запущен</div>
        <div class="countdown-caption" id="countdownCaption"></div>

        <div class="summary-grid">
          <div class="summary-box">
            <div class="summary-label">Всего</div>
            <div class="summary-value" id="metricTotal">19:00</div>
          </div>
          <div class="summary-box">
            <div class="summary-label">Осталось</div>
            <div class="summary-value" id="metricRemaining">19:00</div>
          </div>
        </div>

        <div class="progress-track" aria-hidden="true">
          <div class="progress-fill" id="progressFill"></div>
        </div>

        <div class="primary-actions">
          <button class="reset-btn" type="button" id="resetBtn" aria-label="Сброс">↻</button>
          <button class="primary-btn" type="button" id="startBtn">Старт</button>
        </div>
      </section>

      <section class="param-grid">
        <article class="param-card panel">
          <div class="param-head">
            <div class="param-copy">
              <div class="param-title">Длина раунда</div>
              <div class="param-subtitle">Шаг 5 секунд</div>
              <div class="param-value" id="metricWork">03:00</div>
            </div>
            <div class="stepper-col">
              <button class="stepper-btn" type="button" data-adjust-target="workSec" data-adjust-direction="up">＋</button>
              <button class="stepper-btn" type="button" data-adjust-target="workSec" data-adjust-direction="down">－</button>
            </div>
          </div>
        </article>

        <article class="param-card panel">
          <div class="param-head">
            <div class="param-copy">
              <div class="param-title">Время отдыха</div>
              <div class="param-subtitle">Шаг 5 секунд</div>
              <div class="param-value" id="metricRest">01:00</div>
            </div>
            <div class="stepper-col">
              <button class="stepper-btn" type="button" data-adjust-target="restSec" data-adjust-direction="up">＋</button>
              <button class="stepper-btn" type="button" data-adjust-target="restSec" data-adjust-direction="down">－</button>
            </div>
          </div>
        </article>

        <article class="param-card panel">
          <div class="param-head">
            <div class="param-copy">
              <div class="param-title">Раунды</div>
              <div class="param-subtitle">От 1 до 99</div>
              <div class="param-value" id="metricRounds">5</div>
            </div>
            <div class="stepper-col">
              <button class="stepper-btn" type="button" data-adjust-target="rounds" data-adjust-direction="up">＋</button>
              <button class="stepper-btn" type="button" data-adjust-target="rounds" data-adjust-direction="down">－</button>
            </div>
          </div>
        </article>

        <article class="param-card panel">
          <div class="param-head">
            <div class="param-copy">
              <div class="param-title">Метроном</div>
              <div class="param-subtitle" id="metronomeStatus">Выкл</div>
              <div class="param-value" id="metricMetronome">20</div>
            </div>
            <div class="stepper-col">
              <button class="stepper-btn" type="button" data-adjust-target="metronomeBpm" data-adjust-direction="up">＋</button>
              <button class="stepper-btn" type="button" data-adjust-target="metronomeBpm" data-adjust-direction="down">－</button>
            </div>
          </div>
        </article>
      </section>
    </main>

    <div class="modal-backdrop" id="settingsModal" hidden>
      <section class="settings-modal panel">
        <div class="settings-head">
          <h2>Настройки</h2>
          <button class="link-btn" type="button" id="closeSettingsBtn">Закрыть</button>
        </div>

        <div class="settings-grid">
          <label class="field">
            <span class="field-label">Раундов</span>
            <input class="field-input" type="number" id="roundsInput" min="1" max="99" step="1" />
          </label>

          <label class="field">
            <span class="field-label">Работа (сек)</span>
            <input class="field-input" type="number" id="workSecInput" min="1" max="3600" step="1" />
          </label>

          <label class="field">
            <span class="field-label">Отдых (сек)</span>
            <input class="field-input" type="number" id="restSecInput" min="0" max="3600" step="1" />
          </label>

          <label class="field">
            <span class="field-label">Метроном (уд/мин)</span>
            <input class="field-input" type="number" id="metronomeBpmInput" min="0" max="300" step="1" />
          </label>

          <label class="checkbox-field">
            <input type="checkbox" id="countdownEnabledInput" />
            <span>Финальный отсчёт 3-2-1</span>
          </label>

          <label class="checkbox-field">
            <input type="checkbox" id="warning10EnabledInput" />
            <span>Warning за 10 секунд</span>
          </label>

          <label class="checkbox-field">
            <input type="checkbox" id="audioEnabledInput" />
            <span>Включить звук cue/countdown</span>
          </label>

          <label class="checkbox-field">
            <input type="checkbox" id="metronomeEnabledInput" />
            <span>Включить метроном</span>
          </label>
        </div>

        <div class="modal-actions">
          <button class="primary-btn" type="button" id="saveSettingsBtn">Сохранить</button>
        </div>
      </section>
    </div>

    <script type="module" src="./js/app.js"></script>
  </body>
</html>
